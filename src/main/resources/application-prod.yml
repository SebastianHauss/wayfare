spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 10000
      initialization-fail-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      connect-timeout: 5s
      timeout: 5s
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

# Render terminates TLS at its proxy; honoring X-Forwarded-* keeps Spring aware
# that requests arrived over https when building absolute URLs.
server:
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL}
  allowed-origins: ${ALLOWED_ORIGINS}
  frontend-url: ${FRONTEND_URL:}
  mail-from: ${MAIL_FROM:onboarding@resend.dev}
  resend-api-key: ${RESEND_API_KEY:}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:2592000}

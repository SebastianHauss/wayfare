spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 10000
      initialization-fail-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      connect-timeout: 5s
      timeout: 5s
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

# Render terminates TLS at its proxy; without honoring X-Forwarded-Proto the
# OAuth redirect_uri would be built as http:// and Google would reject it.
server:
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL}
  allowed-origins: ${ALLOWED_ORIGINS}
  frontend-url: ${FRONTEND_URL:}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:2592000}

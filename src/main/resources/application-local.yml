spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wayfare
    username: wayfare
    password: wayfare

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  base-url: http://localhost:8080
  allowed-origins: http://localhost:5173,http://localhost:3000
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:Wayfare <noreply@wayfare.local>}

jwt:
  secret: local-dev-secret-do-not-use-in-production-01234567
  access-token-expiration: 900
  refresh-token-expiration: 2592000

logging:
  level:
    com.sebastianhauss.wayfare: DEBUG

services:
  postgres:
    image: postgres:16-alpine
    container_name: wayfare-postgres
    environment:
      POSTGRES_DB: wayfare
      POSTGRES_USER: wayfare
      POSTGRES_PASSWORD: wayfare
    ports:
      - "5432:5432"
    volumes:
      - wayfare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayfare -d wayfare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wayfare-redis
    ports:
      - "6379:6379"
    volumes:
      - wayfare-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wayfare-postgres-data:
  wayfare-redis-data:
